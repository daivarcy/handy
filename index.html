<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="theme-color" content="#0d1117">
<title>ハンディ棚卸</title>
<style>
:root{
  --bg:#0d1117;--surf:#161b22;--surf2:#21262d;
  --accent:#f78166;--green:#3fb950;--blue:#58a6ff;
  --yellow:#e3b341;--purple:#bc8cff;--red:#da3633;
  --text:#e6edf3;--dim:#8b949e;--border:#30363d;--r:12px;
}
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
html,body{height:100%;background:var(--bg);color:var(--text);
  font-family:-apple-system,'Hiragino Sans',sans-serif;overflow:hidden}

/* ══ TABS ══ */
.tabs{position:fixed;top:0;left:0;right:0;z-index:100;
  display:flex;background:var(--surf);border-bottom:1px solid var(--border);
  padding-top:env(safe-area-inset-top,0)}
.tab{flex:1;padding:13px 2px;text-align:center;font-size:11px;font-weight:700;
  color:var(--dim);cursor:pointer;border-bottom:2px solid transparent;transition:all .2s}
.tab.active{color:var(--accent);border-bottom-color:var(--accent)}
:root{--th:calc(env(safe-area-inset-top,0px) + 48px)}

/* ══ PAGES ══ */
.page{position:fixed;top:var(--th);left:0;right:0;
  bottom:env(safe-area-inset-bottom,0);
  display:none;flex-direction:column;background:var(--bg);overflow:hidden;z-index:10}
.page.show{display:flex}

/* ════════════════════════════
   PAGE 0: スキャン（JAN入力）
════════════════════════════ */
#p0{align-items:center;justify-content:flex-start;padding-top:24px}

.scan-top{width:100%;max-width:420px;padding:0 20px;display:flex;flex-direction:column;gap:16px}

.scan-logo{text-align:center;margin-bottom:4px}
.scan-logo-icon{font-size:48px}
.scan-logo-title{font-size:20px;font-weight:800;margin-top:6px}
.scan-logo-sub{font-size:12px;color:var(--dim);margin-top:2px}

/* JANコード入力 */
.jan-card{background:var(--surf);border:1px solid var(--border);
  border-radius:20px;padding:20px;display:flex;flex-direction:column;gap:12px}
.jan-label{font-size:11px;color:var(--dim);letter-spacing:.1em;font-weight:700}
.jan-input-row{display:flex;gap:8px;align-items:center}
.jan-input{
  flex:1;background:var(--surf2);border:2px solid var(--border);
  border-radius:12px;padding:16px;color:var(--text);
  font-size:24px;font-family:monospace;font-weight:700;
  text-align:center;letter-spacing:.08em;outline:none;
  -webkit-appearance:none;transition:border-color .2s;
}
.jan-input:focus{border-color:var(--accent);box-shadow:0 0 0 3px rgba(247,129,102,.15)}
.jan-input::placeholder{font-size:14px;color:var(--surf2);filter:brightness(3);font-weight:400;letter-spacing:0}
.btn-jan-go{
  background:var(--accent);border:none;border-radius:12px;
  width:56px;height:56px;color:#fff;font-size:24px;
  cursor:pointer;flex-shrink:0;display:flex;align-items:center;justify-content:center;
  transition:opacity .2s;
}
.btn-jan-go:active{opacity:.8}

/* 最近スキャン */
.recent-label{font-size:11px;color:var(--dim);letter-spacing:.08em;font-weight:700;
  padding:0 20px;margin-top:4px}
.recent-list{width:100%;overflow-y:auto;flex:1;padding:6px 20px 20px}
.recent-card{background:var(--surf);border:1px solid var(--border);
  border-radius:var(--r);display:flex;align-items:center;gap:10px;
  padding:10px 12px;margin-bottom:6px;cursor:pointer;transition:all .15s}
.recent-card:active{background:rgba(247,129,102,.08);border-color:var(--accent)}
.recent-thumb{width:44px;height:44px;border-radius:8px;overflow:hidden;
  background:var(--surf2);display:flex;align-items:center;justify-content:center;
  font-size:20px;flex-shrink:0}
.recent-thumb img{width:100%;height:100%;object-fit:cover}
.recent-info{flex:1;min-width:0}
.recent-name{font-size:13px;font-weight:700;white-space:nowrap;
  overflow:hidden;text-overflow:ellipsis}
.recent-jan{font-size:10px;color:var(--dim);font-family:monospace}
.recent-saved{font-size:10px;color:var(--dim)}
.recent-arr{color:var(--dim);font-size:16px;flex-shrink:0}
.empty-recent{text-align:center;padding:32px 20px;color:var(--dim);font-size:13px}

/* ════════════════════════════
   棚卸入力ポップアップ
════════════════════════════ */
#stockPopup{
  position:fixed;inset:0;z-index:200;
  display:none;flex-direction:column;background:var(--bg);
  padding-top:env(safe-area-inset-top,0);
}
#stockPopup.show{display:flex;animation:su .3s cubic-bezier(.34,1.2,.64,1)}
@keyframes su{0%{transform:translateY(60px);opacity:0}100%{transform:translateY(0);opacity:1}}

.sp-head{display:flex;align-items:stretch;background:var(--surf);
  border-bottom:1px solid var(--border);flex-shrink:0}
.sp-img{width:88px;height:88px;object-fit:cover;flex-shrink:0}
.sp-noimg{width:88px;height:88px;background:var(--surf2);
  display:flex;align-items:center;justify-content:center;font-size:32px;flex-shrink:0}
.sp-meta{flex:1;padding:10px 10px 10px 12px;min-width:0}
.sp-jan-txt{font-family:monospace;font-size:10px;color:var(--dim);margin-bottom:2px}
.sp-name-txt{font-size:15px;font-weight:800;line-height:1.3;margin-bottom:5px}
.sp-prices{display:flex;gap:10px;align-items:baseline;flex-wrap:wrap}
.sp-price-val{font-size:20px;font-weight:900;color:var(--accent)}
.sp-price-lbl{font-size:10px;color:var(--dim)}
.sp-sale-val{font-size:16px;font-weight:800;color:var(--yellow)}
.sp-sale-lbl{font-size:10px;color:var(--yellow);background:rgba(227,179,65,.15);
  border:1px solid rgba(227,179,65,.35);border-radius:4px;padding:1px 5px}
.btn-spclose{background:none;border:none;color:var(--dim);font-size:22px;
  padding:12px 10px 12px 4px;cursor:pointer;flex-shrink:0;align-self:flex-start}

.sp-body{flex:1;overflow-y:auto;padding:10px 12px;display:flex;flex-direction:column;gap:8px}

/* 数量カード */
.qcard{background:var(--surf);border:1px solid var(--border);border-radius:var(--r);padding:12px 14px}
.qcard-lbl{font-size:10px;font-weight:700;letter-spacing:.08em;margin-bottom:8px;
  display:flex;align-items:center;gap:5px;color:var(--dim)}
.qrow{display:flex;align-items:center;justify-content:space-between;gap:8px}
.qsub{font-size:11px;color:var(--dim);flex:1}
.qctrl{display:flex;align-items:center;background:var(--surf2);
  border:1.5px solid var(--border);border-radius:10px;overflow:hidden}
.btnq{width:48px;height:48px;border:none;background:none;color:var(--text);
  font-size:26px;font-weight:200;cursor:pointer;
  display:flex;align-items:center;justify-content:center;flex-shrink:0;
  transition:background .1s}
.btnq:active{background:rgba(255,255,255,.12)}
.qnum{min-width:54px;text-align:center;font-size:22px;font-weight:800;
  font-family:monospace;padding:0 2px;cursor:pointer}

.date-row{margin-top:8px;display:flex;align-items:center;gap:8px}
.date-lbl{font-size:11px;color:var(--dim);flex-shrink:0}
.date-inp{background:var(--surf2);border:1px solid var(--border);border-radius:8px;
  padding:7px 10px;color:var(--text);font-size:14px;font-family:inherit;
  outline:none;flex:1;-webkit-appearance:none;min-width:0}
.date-inp:focus{border-color:var(--blue)}

.sp-foot{flex-shrink:0;padding:10px 12px calc(env(safe-area-inset-bottom,0px)+10px);
  background:var(--surf);border-top:1px solid var(--border);display:flex;gap:8px}
.btn-save{flex:1;background:linear-gradient(135deg,#1f6feb,var(--blue));
  border:none;border-radius:var(--r);padding:16px;color:#fff;
  font-size:15px;font-weight:800;font-family:inherit;cursor:pointer}
.btn-save:active{opacity:.88}
.btn-next{flex-shrink:0;background:var(--surf2);border:1px solid var(--border);
  border-radius:var(--r);padding:16px;color:var(--text);
  font-size:13px;font-weight:700;font-family:inherit;cursor:pointer;white-space:nowrap}
.btn-next:active{border-color:var(--accent);color:var(--accent)}

/* 未登録 */
#unknownPop{position:fixed;inset:0;z-index:300;background:rgba(0,0,0,.85);
  display:none;align-items:center;justify-content:center;padding:24px}
#unknownPop.show{display:flex}
.upcard{background:var(--surf);border:1px solid var(--border);border-radius:20px;
  padding:28px 22px;width:100%;max-width:320px;text-align:center}
.upicon{font-size:48px;margin-bottom:10px}
.uptitle{font-size:16px;font-weight:800;margin-bottom:4px}
.upjan{font-family:monospace;font-size:13px;color:var(--dim);margin-bottom:16px}
.btn-upreg{width:100%;background:var(--accent);border:none;border-radius:var(--r);
  padding:14px;color:#fff;font-size:15px;font-weight:800;font-family:inherit;
  cursor:pointer;margin-bottom:8px}
.btn-upclose{width:100%;background:none;border:1px solid var(--border);
  border-radius:var(--r);padding:12px;color:var(--dim);font-size:14px;
  font-family:inherit;cursor:pointer}

/* ════════════════════════════
   PAGE 1: 棚卸一覧
════════════════════════════ */
.lhead{padding:12px 14px;border-bottom:1px solid var(--border);
  background:var(--surf);display:flex;align-items:center;
  justify-content:space-between;flex-shrink:0;gap:8px}
.lhead-title{font-size:15px;font-weight:800}
.lhead-cnt{font-size:11px;color:var(--dim);margin-top:1px}
.btn-csv{background:rgba(63,185,80,.15);border:1px solid rgba(63,185,80,.3);
  border-radius:8px;padding:7px 12px;color:var(--green);font-size:12px;
  font-weight:700;font-family:inherit;cursor:pointer}
.btn-clr{background:rgba(218,54,51,.1);border:1px solid rgba(218,54,51,.2);
  border-radius:8px;padding:7px 10px;color:var(--red);font-size:12px;
  font-weight:700;font-family:inherit;cursor:pointer}
.inv-list{padding:8px;display:flex;flex-direction:column;gap:6px;overflow-y:auto;flex:1}
.icard{background:var(--surf);border:1px solid var(--border);
  border-radius:var(--r);overflow:hidden}
.icard-top{display:flex;align-items:center;gap:10px;padding:10px 12px}
.ithumb{width:48px;height:48px;border-radius:8px;overflow:hidden;background:var(--surf2);
  display:flex;align-items:center;justify-content:center;font-size:20px;flex-shrink:0}
.ithumb img{width:100%;height:100%;object-fit:cover}
.iinfo{flex:1;min-width:0}
.iname{font-size:13px;font-weight:700;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.ijan{font-size:10px;color:var(--dim);font-family:monospace}
.itime{font-size:10px;color:var(--dim)}
.btn-iedit{background:none;border:1px solid var(--border);border-radius:6px;
  padding:5px 10px;color:var(--blue);font-size:11px;font-weight:700;
  font-family:inherit;cursor:pointer;flex-shrink:0}
.inums{display:grid;grid-template-columns:repeat(4,1fr);border-top:1px solid var(--border)}
.inum{padding:8px 4px;text-align:center;border-right:1px solid var(--border)}
.inum:last-child{border-right:none}
.inum-l{font-size:9px;color:var(--dim);margin-bottom:2px}
.inum-v{font-size:16px;font-weight:800;font-family:monospace}
.empty-state{text-align:center;padding:60px 20px;color:var(--dim)}
.empty-icon{font-size:48px;margin-bottom:12px}
.empty-txt{font-size:13px;line-height:1.7}

/* ════════════════════════════
   PAGE 2: 商品マスタ
════════════════════════════ */
.mhead{padding:12px 14px;border-bottom:1px solid var(--border);
  background:var(--surf);display:flex;align-items:center;
  justify-content:space-between;flex-shrink:0}
.mhead-t{font-size:15px;font-weight:800}
.mhead-c{font-size:11px;color:var(--dim);margin-top:1px}
.btn-madd{background:var(--accent);border:none;border-radius:8px;
  padding:9px 16px;color:#fff;font-size:12px;font-weight:800;
  font-family:inherit;cursor:pointer}
.mlist{padding:8px;display:flex;flex-direction:column;gap:6px;overflow-y:auto;flex:1}
.mcard{background:var(--surf);border:1px solid var(--border);border-radius:var(--r);
  display:flex;align-items:center;gap:10px;padding:10px 12px}
.mthumb{width:48px;height:48px;border-radius:8px;overflow:hidden;background:var(--surf2);
  display:flex;align-items:center;justify-content:center;font-size:20px;flex-shrink:0}
.mthumb img{width:100%;height:100%;object-fit:cover}
.minfo{flex:1;min-width:0}
.mname{font-size:13px;font-weight:700;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.mjan{font-size:10px;color:var(--dim);font-family:monospace;margin-bottom:2px}
.mprices{display:flex;gap:8px;align-items:center}
.mprice{font-size:14px;font-weight:800;color:var(--accent)}
.msale{font-size:12px;font-weight:700;color:var(--yellow)}
.mbtns{display:flex;flex-direction:column;gap:4px;flex-shrink:0}
.btn-medit{background:var(--surf2);border:1px solid var(--border);border-radius:6px;
  padding:5px 10px;color:var(--blue);font-size:11px;font-weight:700;
  font-family:inherit;cursor:pointer}
.btn-mdel{background:none;border:1px solid var(--border);border-radius:6px;
  padding:5px 10px;color:var(--dim);font-size:11px;font-family:inherit;cursor:pointer}

/* ════════════════════════════
   商品マスタ登録モーダル
════════════════════════════ */
#mmodal{position:fixed;inset:0;z-index:400;background:rgba(0,0,0,.85);
  display:none;align-items:flex-end}
#mmodal.show{display:flex}
.msheet{background:var(--surf);border-radius:20px 20px 0 0;
  border-top:1px solid var(--border);width:100%;max-height:92vh;overflow-y:auto;
  padding:0 14px calc(env(safe-area-inset-bottom,0px)+14px);
  animation:mu .3s cubic-bezier(.34,1.2,.64,1)}
@keyframes mu{0%{transform:translateY(100%)}100%{transform:translateY(0)}}
.mhandle{width:36px;height:4px;background:var(--border);border-radius:2px;margin:12px auto 14px}
.mtitle{font-size:16px;font-weight:800;text-align:center;margin-bottom:14px}
.mimglabel{display:flex;flex-direction:column;align-items:center;justify-content:center;
  width:100px;height:100px;border-radius:14px;border:2px dashed var(--border);
  background:var(--surf2);cursor:pointer;overflow:hidden;position:relative;
  margin:0 auto 14px}
.mimglabel:active{border-color:var(--accent)}
.mimgfile{position:absolute;inset:0;opacity:0;width:100%;height:100%;cursor:pointer;z-index:10;font-size:16px}
.mimgprev{width:100%;height:100%;object-fit:cover;position:absolute;inset:0;display:none}
.mimgov{position:absolute;inset:0;background:rgba(0,0,0,.5);display:none;
  align-items:center;justify-content:center;font-size:12px;color:#fff;font-weight:700;z-index:5}
.mimgicon{font-size:28px;position:relative;z-index:1}
.mimgtxt{font-size:11px;color:var(--dim);margin-top:4px;position:relative;z-index:1}
.mfield{display:flex;flex-direction:column;gap:5px;margin-bottom:10px}
.mlabel{font-size:11px;color:var(--dim);letter-spacing:.06em;font-weight:600}
.minput{background:var(--surf2);border:1px solid var(--border);border-radius:10px;
  padding:13px 14px;color:var(--text);font-size:16px;font-family:inherit;
  outline:none;-webkit-appearance:none;width:100%;transition:border-color .2s}
.minput:focus{border-color:var(--accent)}
.minput::placeholder{color:var(--dim);opacity:.4}
.mrow2{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:10px}
.btn-msave{width:100%;background:var(--accent);border:none;border-radius:var(--r);
  padding:16px;color:#fff;font-size:16px;font-weight:800;font-family:inherit;
  cursor:pointer;margin-bottom:8px}
.btn-mcancel{width:100%;background:none;border:1px solid var(--border);
  border-radius:var(--r);padding:12px;color:var(--dim);font-size:14px;
  font-family:inherit;cursor:pointer}

/* ══ TOAST ══ */
.toast{position:fixed;bottom:calc(env(safe-area-inset-bottom,0px)+80px);left:50%;
  transform:translateX(-50%) translateY(40px);background:var(--surf);
  border:1px solid var(--green);color:var(--green);padding:9px 18px;
  border-radius:30px;font-size:13px;font-weight:700;opacity:0;
  transition:all .3s;z-index:999;white-space:nowrap;pointer-events:none}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0)}
</style>
</head>
<body>

<!-- TABS -->
<div class="tabs">
  <div class="tab active" id="t0" onclick="goTab(0)">🔍 検索</div>
  <div class="tab"        id="t1" onclick="goTab(1)">📋 棚卸一覧</div>
  <div class="tab"        id="t2" onclick="goTab(2)">📦 商品マスタ</div>
</div>

<!-- ════════════════════════════
     PAGE 0: JAN入力・検索
════════════════════════════ -->
<div class="page show" id="p0">
  <div class="scan-top">
    <div class="scan-logo">
      <div class="scan-logo-icon">🏪</div>
      <div class="scan-logo-title">ハンディ棚卸</div>
      <div class="scan-logo-sub">JANコードを入力して検索</div>
    </div>

    <div class="jan-card">
      <div class="jan-label">JANコード BARCODE</div>
      <div class="jan-input-row">
        <input
          type="text" id="janInp"
          class="jan-input"
          placeholder="例）4901234567890"
          inputmode="numeric"
          maxlength="14"
          autocomplete="off"
          onkeydown="if(event.key==='Enter')doSearch()"
        >
        <button class="btn-jan-go" onclick="doSearch()">→</button>
      </div>
    </div>
  </div>

  <!-- 最近の棚卸 -->
  <div class="recent-label" style="margin-top:16px">最近スキャンした商品</div>
  <div class="recent-list" id="recentList"></div>
</div>

<!-- ════════════════════════════
     PAGE 1: 棚卸一覧
════════════════════════════ -->
<div class="page" id="p1">
  <div class="lhead">
    <div><div class="lhead-title">棚卸一覧</div><div class="lhead-cnt" id="invCnt">0件</div></div>
    <div style="display:flex;gap:6px">
      <button class="btn-csv" onclick="exportCSV()">📊 CSV</button>
      <button class="btn-clr" onclick="clearInv()">全消去</button>
    </div>
  </div>
  <div class="inv-list" id="invList"></div>
</div>

<!-- ════════════════════════════
     PAGE 2: 商品マスタ
════════════════════════════ -->
<div class="page" id="p2">
  <div class="mhead">
    <div><div class="mhead-t">商品マスタ</div><div class="mhead-c" id="masterCnt">0件</div></div>
    <button class="btn-madd" onclick="openMmodal(null)">＋ 登録</button>
  </div>
  <div class="mlist" id="masterList"></div>
</div>

<!-- ════════════════════════════
     棚卸入力ポップアップ
════════════════════════════ -->
<div id="stockPopup">
  <div class="sp-head">
    <img class="sp-img" id="spImg" src="" alt="" style="display:none">
    <div class="sp-noimg" id="spNoImg">🛍️</div>
    <div class="sp-meta">
      <div class="sp-jan-txt" id="spJan"></div>
      <div class="sp-name-txt" id="spName"></div>
      <div class="sp-prices">
        <div>
          <div class="sp-price-lbl">通常売価</div>
          <div class="sp-price-val" id="spPrice"></div>
        </div>
        <div id="spSaleWrap" style="display:none;flex-direction:column">
          <div class="sp-sale-lbl">特売</div>
          <div class="sp-sale-val" id="spSale"></div>
        </div>
      </div>
    </div>
    <button class="btn-spclose" onclick="closeStock()">✕</button>
  </div>

  <div class="sp-body">
    <!-- 帳簿在庫 -->
    <div class="qcard">
      <div class="qcard-lbl">📒 帳簿在庫数</div>
      <div class="qrow">
        <div class="qsub">システム上の在庫</div>
        <div class="qctrl">
          <button class="btnq" onclick="chg('book',-1)">−</button>
          <div class="qnum" id="qBook" onclick="editQ('book')">0</div>
          <button class="btnq" onclick="chg('book',1)">＋</button>
        </div>
      </div>
    </div>
    <!-- 実在庫 -->
    <div class="qcard" style="border-color:rgba(88,166,255,.35)">
      <div class="qcard-lbl" style="color:var(--blue)">🔍 実在庫数（カウント）</div>
      <div class="qrow">
        <div class="qsub" id="diffLbl">差異：―</div>
        <div class="qctrl" style="border-color:rgba(88,166,255,.35)">
          <button class="btnq" onclick="chg('actual',-1)">−</button>
          <div class="qnum" id="qActual" onclick="editQ('actual')" style="color:var(--blue)">0</div>
          <button class="btnq" onclick="chg('actual',1)">＋</button>
        </div>
      </div>
    </div>
    <!-- 発注数 -->
    <div class="qcard" style="border-color:rgba(63,185,80,.35)">
      <div class="qcard-lbl" style="color:var(--green)">📦 発注数</div>
      <div class="qrow">
        <div class="qsub">今回発注する数量</div>
        <div class="qctrl" style="border-color:rgba(63,185,80,.35)">
          <button class="btnq" onclick="chg('order',-1)">−</button>
          <div class="qnum" id="qOrder" onclick="editQ('order')" style="color:var(--green)">0</div>
          <button class="btnq" onclick="chg('order',1)">＋</button>
        </div>
      </div>
      <div class="date-row">
        <div class="date-lbl">納期</div>
        <input type="date" class="date-inp" id="orderDate">
      </div>
    </div>
    <!-- 陳列数 -->
    <div class="qcard" style="border-color:rgba(188,140,255,.35)">
      <div class="qcard-lbl" style="color:var(--purple)">🏪 陳列数（フェイス数）</div>
      <div class="qrow">
        <div class="qsub">棚の定番フェイス数</div>
        <div class="qctrl" style="border-color:rgba(188,140,255,.35)">
          <button class="btnq" onclick="chg('display',-1)">−</button>
          <div class="qnum" id="qDisplay" onclick="editQ('display')" style="color:var(--purple)">0</div>
          <button class="btnq" onclick="chg('display',1)">＋</button>
        </div>
      </div>
    </div>
  </div>

  <div class="sp-foot">
    <button class="btn-save" onclick="saveStock()">💾 保存</button>
    <button class="btn-next" onclick="saveAndNext()">保存して次へ →</button>
  </div>
</div>

<!-- 未登録ポップアップ -->
<div id="unknownPop">
  <div class="upcard">
    <div class="upicon">❓</div>
    <div class="uptitle">商品マスタに未登録です</div>
    <div class="upjan" id="upJan"></div>
    <button class="btn-upreg" onclick="regFromUnknown()">このJANで登録する</button>
    <button class="btn-upclose" onclick="closeUnknown()">閉じる</button>
  </div>
</div>

<!-- 商品マスタ登録モーダル -->
<div id="mmodal">
  <div class="msheet">
    <div class="mhandle"></div>
    <div class="mtitle" id="mtitle">商品を登録する</div>
    <input type="hidden" id="meditJan">
    <label class="mimglabel">
      <input type="file" class="mimgfile" id="mimgfile" accept="image/*" onchange="onMimg(event)">
      <img class="mimgprev" id="mimgprev" src="" alt="">
      <div class="mimgov" id="mimgov">変更</div>
      <div class="mimgicon" id="mimgicon">📷</div>
      <div class="mimgtxt" id="mimgtxt">写真を選択</div>
    </label>
    <div class="mfield">
      <div class="mlabel">JANコード（8桁 or 13桁）</div>
      <input type="text" class="minput" id="mjan" placeholder="4901234567890" inputmode="numeric" maxlength="14">
    </div>
    <div class="mfield">
      <div class="mlabel">商品名</div>
      <input type="text" class="minput" id="mname" placeholder="例：〇〇ウォーター 500ml">
    </div>
    <div class="mrow2">
      <div class="mfield">
        <div class="mlabel">通常売価（円）</div>
        <input type="number" class="minput" id="mprice" placeholder="158" inputmode="numeric">
      </div>
      <div class="mfield">
        <div class="mlabel">特売価格（任意）</div>
        <input type="number" class="minput" id="msale" placeholder="未設定" inputmode="numeric">
      </div>
    </div>
    <button class="btn-msave" onclick="saveMaster()">登録する</button>
    <button class="btn-mcancel" onclick="closeMmodal()">キャンセル</button>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
'use strict';
// ════════════════════════════
//  STORAGE
// ════════════════════════════
const MK='hd_m_v1', IK='hd_i_v1';
const lm=()=>{try{return JSON.parse(localStorage.getItem(MK)||'[]')}catch{return[]}};
const sm=a=>localStorage.setItem(MK,JSON.stringify(a));
const li=()=>{try{return JSON.parse(localStorage.getItem(IK)||'[]')}catch{return[]}};
const si=a=>localStorage.setItem(IK,JSON.stringify(a));
const byJan=jan=>lm().find(p=>p.jan===jan)||null;
const esc=s=>String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');

// ════════════════════════════
//  TABS
// ════════════════════════════
function goTab(n){
  document.querySelectorAll('.page').forEach((p,i)=>p.classList.toggle('show',i===n));
  document.querySelectorAll('.tab').forEach((t,i)=>t.classList.toggle('active',i===n));
  if(n===1) renderInv();
  if(n===2) renderMaster();
  if(n===0){
    renderRecent();
    // JAN入力欄にフォーカス
    setTimeout(()=>{
      const inp=document.getElementById('janInp');
      if(inp) inp.focus();
    },100);
  }
}

// ════════════════════════════
//  JAN検索
// ════════════════════════════
function doSearch(){
  const inp=document.getElementById('janInp');
  const jan=inp.value.trim().replace(/[^\d]/g,'');
  if(!jan){toast('JANコードを入力してください');return;}
  if(!/^\d{8}$|^\d{13}$/.test(jan)){
    toast('JANコードは8桁または13桁の数字です');return;
  }
  inp.value='';
  const prod=byJan(jan);
  if(!prod){
    document.getElementById('upJan').textContent=jan;
    document.getElementById('unknownPop').classList.add('show');
    return;
  }
  openStock(jan);
}

// ════════════════════════════
//  棚卸ポップアップ
// ════════════════════════════
let curJan='';
let qty={book:0,actual:0,order:0,display:0};

function openStock(jan){
  curJan=jan;
  const prod=byJan(jan);
  if(!prod){
    document.getElementById('upJan').textContent=jan;
    document.getElementById('unknownPop').classList.add('show');
    return;
  }
  // 商品情報セット
  const img=document.getElementById('spImg');
  const noimg=document.getElementById('spNoImg');
  if(prod.image){img.src=prod.image;img.style.display='block';noimg.style.display='none';}
  else{img.style.display='none';noimg.style.display='flex';}

  document.getElementById('spJan').textContent=jan;
  document.getElementById('spName').textContent=prod.name;
  document.getElementById('spPrice').textContent=prod.price?`¥${Number(prod.price).toLocaleString()}`:'未設定';

  const sw=document.getElementById('spSaleWrap');
  if(prod.sale){
    document.getElementById('spSale').textContent=`¥${Number(prod.sale).toLocaleString()}`;
    sw.style.display='flex';
  }else{sw.style.display='none';}

  // 既存データ
  const inv=li().find(i=>i.jan===jan);
  qty=inv?{book:inv.book||0,actual:inv.actual||0,order:inv.order||0,display:inv.display||0}
         :{book:0,actual:0,order:0,display:0};

  // 納期デフォルト（翌日）
  const d=new Date();d.setDate(d.getDate()+1);
  document.getElementById('orderDate').value=inv?.orderDate||d.toISOString().split('T')[0];

  renderQty();
  document.getElementById('stockPopup').classList.add('show');
}

function closeStock(){
  document.getElementById('stockPopup').classList.remove('show');
  renderRecent();
}

function renderQty(){
  document.getElementById('qBook').textContent=qty.book;
  document.getElementById('qActual').textContent=qty.actual;
  document.getElementById('qOrder').textContent=qty.order;
  document.getElementById('qDisplay').textContent=qty.display;
  const diff=qty.actual-qty.book;
  const dl=document.getElementById('diffLbl');
  dl.innerHTML=diff===0?'差異：なし'
    :diff>0?`<span style="color:var(--green)">差異：+${diff}（過剰）</span>`
           :`<span style="color:var(--red)">差異：${diff}（不足）</span>`;
}

function chg(k,d){
  qty[k]=Math.max(0,qty[k]+d);
  renderQty();
}

function editQ(k){
  const labels={book:'帳簿在庫',actual:'実在庫',order:'発注数',display:'陳列数'};
  const v=prompt(`${labels[k]}を入力`,qty[k]);
  if(v===null)return;
  const n=parseInt(v);
  if(!isNaN(n)&&n>=0){qty[k]=n;renderQty();}
}

function saveStock(){
  const inv=li();
  const prod=byJan(curJan);
  const entry={
    jan:curJan,name:prod?.name||'不明',
    book:qty.book,actual:qty.actual,order:qty.order,display:qty.display,
    orderDate:document.getElementById('orderDate').value,
    savedAt:new Date().toISOString()
  };
  const idx=inv.findIndex(i=>i.jan===curJan);
  if(idx!==-1)inv[idx]=entry;else inv.push(entry);
  si(inv);
  closeStock();
  toast('保存しました ✓');
}

function saveAndNext(){
  // 保存してポップアップを閉じ、JAN入力欄にフォーカス
  const inv=li();
  const prod=byJan(curJan);
  const entry={
    jan:curJan,name:prod?.name||'不明',
    book:qty.book,actual:qty.actual,order:qty.order,display:qty.display,
    orderDate:document.getElementById('orderDate').value,
    savedAt:new Date().toISOString()
  };
  const idx=inv.findIndex(i=>i.jan===curJan);
  if(idx!==-1)inv[idx]=entry;else inv.push(entry);
  si(inv);
  document.getElementById('stockPopup').classList.remove('show');
  toast('保存しました ✓');
  renderRecent();
  setTimeout(()=>{
    const inp=document.getElementById('janInp');
    if(inp)inp.focus();
  },200);
}

// ════════════════════════════
//  最近スキャン一覧
// ════════════════════════════
function renderRecent(){
  const inv=li().slice().sort((a,b)=>new Date(b.savedAt)-new Date(a.savedAt)).slice(0,10);
  const el=document.getElementById('recentList');
  if(!inv.length){
    el.innerHTML='<div class="empty-recent">まだ棚卸データがありません<br>JANコードを入力してください</div>';
    return;
  }
  el.innerHTML=inv.map(i=>{
    const prod=byJan(i.jan);
    const t=new Date(i.savedAt);
    const ts=`${t.getMonth()+1}/${t.getDate()} ${t.getHours()}:${String(t.getMinutes()).padStart(2,'0')}`;
    return`<div class="recent-card" onclick="openStock('${i.jan}')">
      <div class="recent-thumb">${prod?.image?`<img src="${prod.image}" alt="">`:'🛍️'}</div>
      <div class="recent-info">
        <div class="recent-name">${esc(i.name)}</div>
        <div class="recent-jan">${i.jan}</div>
        <div class="recent-saved">${ts} 保存</div>
      </div>
      <div class="recent-arr">›</div>
    </div>`;
  }).join('');
}

// ════════════════════════════
//  未登録ポップアップ
// ════════════════════════════
function closeUnknown(){document.getElementById('unknownPop').classList.remove('show');}
function regFromUnknown(){
  const jan=document.getElementById('upJan').textContent;
  closeUnknown();
  goTab(2);
  openMmodal(null,jan);
}

// ════════════════════════════
//  棚卸一覧
// ════════════════════════════
function renderInv(){
  const inv=li();
  document.getElementById('invCnt').textContent=`${inv.length}件`;
  const el=document.getElementById('invList');
  if(!inv.length){
    el.innerHTML='<div class="empty-state"><div class="empty-icon">📋</div><div class="empty-txt">まだ棚卸データがありません<br>検索タブからJANを入力してください</div></div>';
    return;
  }
  el.innerHTML=inv.slice().reverse().map(i=>{
    const prod=byJan(i.jan);
    const diff=(i.actual||0)-(i.book||0);
    const dc=diff<0?`color:var(--red)`:diff>0?`color:var(--green)`:'';
    const t=new Date(i.savedAt);
    const ts=`${t.getMonth()+1}/${t.getDate()} ${t.getHours()}:${String(t.getMinutes()).padStart(2,'0')}`;
    return`<div class="icard">
      <div class="icard-top">
        <div class="ithumb">${prod?.image?`<img src="${prod.image}" alt="">`:'🛍️'}</div>
        <div class="iinfo">
          <div class="iname">${esc(i.name)}</div>
          <div class="ijan">${i.jan}</div>
          <div class="itime">${ts}${i.orderDate?' 納期:'+i.orderDate:''}</div>
        </div>
        <button class="btn-iedit" onclick="openStock('${i.jan}');goTab(0)">編集</button>
      </div>
      <div class="inums">
        <div class="inum"><div class="inum-l">帳簿</div><div class="inum-v">${i.book||0}</div></div>
        <div class="inum"><div class="inum-l">実在庫</div><div class="inum-v" style="${dc}">${i.actual||0}</div></div>
        <div class="inum"><div class="inum-l">発注</div><div class="inum-v" style="color:var(--green)">${i.order||0}</div></div>
        <div class="inum"><div class="inum-l">陳列</div><div class="inum-v" style="color:var(--purple)">${i.display||0}</div></div>
      </div>
    </div>`;
  }).join('');
}

function clearInv(){
  if(!confirm('棚卸データをすべて消去しますか？'))return;
  si([]);renderInv();toast('消去しました');
}

function exportCSV(){
  const inv=li();
  if(!inv.length){toast('データがありません');return;}
  const h='JAN,商品名,帳簿,実在庫,差異,発注数,納期,陳列数,記録日時';
  const rows=inv.map(i=>
    [i.jan,`"${i.name}"`,i.book||0,i.actual||0,(i.actual||0)-(i.book||0),i.order||0,i.orderDate||'',i.display||0,i.savedAt].join(',')
  ).join('\n');
  const b=new Blob(['\uFEFF'+h+'\n'+rows],{type:'text/csv;charset=utf-8'});
  const a=document.createElement('a');
  a.href=URL.createObjectURL(b);
  a.download=`棚卸_${new Date().toLocaleDateString('ja')}.csv`;
  a.click();
}

// ════════════════════════════
//  商品マスタ
// ════════════════════════════
let mimg=null;

function renderMaster(){
  const m=lm();
  document.getElementById('masterCnt').textContent=`${m.length}件`;
  const el=document.getElementById('masterList');
  if(!m.length){
    el.innerHTML='<div class="empty-state"><div class="empty-icon">📦</div><div class="empty-txt">「＋ 登録」から商品を追加してください</div></div>';
    return;
  }
  el.innerHTML=m.slice().reverse().map(p=>`
    <div class="mcard">
      <div class="mthumb">${p.image?`<img src="${p.image}" alt="">`:'🛍️'}</div>
      <div class="minfo">
        <div class="mname">${esc(p.name)}</div>
        <div class="mjan">${p.jan}</div>
        <div class="mprices">
          <span class="mprice">¥${Number(p.price).toLocaleString()}</span>
          ${p.sale?`<span class="msale">特売¥${Number(p.sale).toLocaleString()}</span>`:''}
        </div>
      </div>
      <div class="mbtns">
        <button class="btn-medit" onclick='openMmodal(${JSON.stringify(p)})'>編集</button>
        <button class="btn-mdel" onclick="delMaster('${p.jan}')">削除</button>
      </div>
    </div>`).join('');
}

function openMmodal(prod,prefill=''){
  mimg=prod?.image||null;
  document.getElementById('mtitle').textContent=prod?'商品を編集する':'商品を登録する';
  document.getElementById('meditJan').value=prod?.jan||'';
  document.getElementById('mjan').value=prod?.jan||prefill;
  document.getElementById('mname').value=prod?.name||'';
  document.getElementById('mprice').value=prod?.price||'';
  document.getElementById('msale').value=prod?.sale||'';
  setMimg(mimg);
  replaceMimgInput();
  document.getElementById('mmodal').classList.add('show');
}

function closeMmodal(){document.getElementById('mmodal').classList.remove('show');}

function setMimg(url){
  const prev=document.getElementById('mimgprev');
  const ov=document.getElementById('mimgov');
  const icon=document.getElementById('mimgicon');
  const txt=document.getElementById('mimgtxt');
  if(url){prev.src=url;prev.style.display='block';ov.style.display='flex';icon.style.display='none';txt.style.display='none';}
  else{prev.src='';prev.style.display='none';ov.style.display='none';icon.style.display='';txt.style.display='';}
}

function onMimg(e){
  const file=e.target.files?.[0];
  if(!file)return;
  const reader=new FileReader();
  reader.onload=ev=>{
    const img=new Image();
    img.onload=()=>{
      const MAX=800;let w=img.width,h=img.height;
      if(w>MAX||h>MAX){if(w>h){h=Math.round(h*MAX/w);w=MAX;}else{w=Math.round(w*MAX/h);h=MAX;}}
      const c=document.createElement('canvas');c.width=w;c.height=h;
      c.getContext('2d').drawImage(img,0,0,w,h);
      mimg=c.toDataURL('image/jpeg',.85);
      setMimg(mimg);
    };
    img.src=ev.target.result;
  };
  reader.readAsDataURL(file);
  replaceMimgInput();
}

function replaceMimgInput(){
  const old=document.getElementById('mimgfile');
  if(!old)return;
  const neo=document.createElement('input');
  neo.type='file';neo.accept='image/*';neo.className='mimgfile';neo.id='mimgfile';
  neo.onchange=onMimg;
  old.parentNode.replaceChild(neo,old);
}

function saveMaster(){
  const jan=document.getElementById('mjan').value.trim();
  const name=document.getElementById('mname').value.trim();
  const price=document.getElementById('mprice').value.trim();
  const sale=document.getElementById('msale').value.trim();
  const editJ=document.getElementById('meditJan').value;
  if(!jan){toast('JANコードを入力してください');return;}
  if(!/^\d{8}$|^\d{13}$/.test(jan)){toast('JANは8桁または13桁の数字です');return;}
  if(!name){toast('商品名を入力してください');return;}
  if(!price){toast('売価を入力してください');return;}
  const m=lm();
  if(editJ){
    const idx=m.findIndex(p=>p.jan===editJ);
    if(idx!==-1){m[idx]={jan,name,price,sale:sale||null,image:mimg||m[idx].image};sm(m);toast('更新しました ✓');}
  }else{
    if(m.find(p=>p.jan===jan)){toast('このJANはすでに登録されています');return;}
    m.push({jan,name,price,sale:sale||null,image:mimg||null});
    sm(m);toast('登録しました ✓');
  }
  mimg=null;closeMmodal();renderMaster();
}

function delMaster(jan){
  if(!confirm('削除しますか？'))return;
  sm(lm().filter(p=>p.jan!==jan));renderMaster();toast('削除しました');
}

// ════════════════════════════
//  TOAST
// ════════════════════════════
function toast(msg){
  const el=document.getElementById('toast');
  el.textContent=msg;el.classList.add('show');
  clearTimeout(el._t);el._t=setTimeout(()=>el.classList.remove('show'),2500);
}

// ════════════════════════════
//  INIT
// ════════════════════════════
document.addEventListener('DOMContentLoaded',()=>{
  // デモ用サンプルデータ（初回のみ）
  if(!lm().length){
    sm([
      {jan:'4901085184981',name:'コカ・コーラ 500ml',price:'162',sale:'138',image:null},
      {jan:'4901085616093',name:'綾鷹 525ml',price:'151',sale:null,image:null},
      {jan:'4901085678886',name:'爽健美茶 600ml',price:'151',sale:'129',image:null},
    ]);
  }
  renderRecent();
  // 起動時にJAN入力欄にフォーカス
  setTimeout(()=>document.getElementById('janInp')?.focus(),300);
});
</script>
</body>
</html>
